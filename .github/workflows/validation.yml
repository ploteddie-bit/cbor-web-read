name: CBOR-Web validation

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  validate-examples:
    name: Validate examples/*.cbor (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Install stable Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry and build artefacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            tools/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('tools/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Build cbor-web-validate
        run: cargo build --release --manifest-path tools/Cargo.toml --bin cbor-web-validate

      - name: Validate every example
        shell: bash
        run: ./tools/target/release/cbor-web-validate --strict examples/*.cbor

  rust-tests:
    name: cargo test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Install stable Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry and build artefacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            tools/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('tools/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: cargo test
        run: cargo test --manifest-path tools/Cargo.toml --all-targets

  roundtrip:
    name: YAML -> CBOR -> validate -> sign -> verify (ubuntu)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install stable Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry and build artefacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            tools/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('tools/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Build tooling
        run: cargo build --release --manifest-path tools/Cargo.toml

      - name: Generate sample site from YAML
        run: ./tools/target/release/cbor-web-gen tools/examples/site.yaml -o /tmp/roundtrip.cbor

      - name: Validate the generated file (strict)
        run: ./tools/target/release/cbor-web-validate --strict /tmp/roundtrip.cbor

  json-preview:
    name: Validate examples/example-readable.json is parseable
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Parse JSON with jq
        run: jq . examples/example-readable.json > /dev/null && echo OK

  rust-checks:
    name: cargo fmt + clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install stable Rust toolchain with rustfmt and clippy
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - name: cargo fmt --check
        run: cargo fmt --manifest-path tools/Cargo.toml --check
      - name: cargo clippy
        run: cargo clippy --manifest-path tools/Cargo.toml --release --all-targets -- -D warnings

  security-audit:
    name: cargo audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install stable Rust toolchain
        uses: dtolnay/rust-toolchain@stable
      - name: Install cargo-audit
        run: cargo install cargo-audit --locked
      - name: Run cargo audit
        run: cargo audit --file tools/Cargo.lock
